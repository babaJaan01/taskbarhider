name: Native Build and Release

on:
  push:
    branches: [main, master]
    paths:
      - 'native/**'
      - 'installer/**'
      - '.github/workflows/native-release.yml'
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'native/**'
      - 'installer/**'
      - '.github/workflows/native-release.yml'
  workflow_dispatch:

concurrency:
  group: native-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: windows-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
          - arch: x86
            cmake_arch: Win32
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S native -B native/build -A ${{ matrix.cmake_arch }}

      - name: Build Release
        run: cmake --build native/build --config Release --parallel

      - name: Collect artifact
        run: |
          $src = "native/build/bin/TaskbarHider.exe"
          if (-not (Test-Path $src)) { throw "Missing $src" }
          $dst = "artifact/TaskbarHider-${{ matrix.arch }}.exe"
          New-Item -ItemType Directory -Force -Path artifact | Out-Null
          Copy-Item $src $dst -Force
          Get-Item $dst | Format-List Name, Length, FullName
          "### ${{ matrix.arch }} build"            | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          ("Size: {0} bytes" -f (Get-Item $dst).Length) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
          $hash = Get-FileHash $dst -Algorithm SHA256
          "SHA256: $($hash.Hash)"                   | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskbarHider-${{ matrix.arch }}
          path: artifact/TaskbarHider-${{ matrix.arch }}.exe
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer executables
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "Missing Inno Setup compiler: $iscc" }

          & $iscc "installer\TaskbarHider.iss" `
            "/DBuildArch=x64" `
            "/DSourceExePath=$((Resolve-Path 'artifacts/TaskbarHider-x64/TaskbarHider-x64.exe').Path)" `
            "/O$((Resolve-Path '.').Path)\release"

          & $iscc "installer\TaskbarHider.iss" `
            "/DBuildArch=x86" `
            "/DSourceExePath=$((Resolve-Path 'artifacts/TaskbarHider-x86/TaskbarHider-x86.exe').Path)" `
            "/O$((Resolve-Path '.').Path)\release"

      # OPTIONAL — code sign with Azure Trusted Signing. Uncomment and set
      # the four secrets below once you have a Trusted Signing account.
      #
      # - name: Sign binaries (Azure Trusted Signing)
      #   uses: azure/trusted-signing-action@v0.5.1
      #   with:
      #     azure-tenant-id:     ${{ secrets.AZURE_TENANT_ID }}
      #     azure-client-id:     ${{ secrets.AZURE_CLIENT_ID }}
      #     azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      #     endpoint:            ${{ secrets.AZURE_SIGNING_ENDPOINT }}
      #     trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
      #     certificate-profile-name:     ${{ secrets.AZURE_SIGNING_PROFILE }}
      #     files-folder: artifacts
      #     files-folder-filter: exe
      #     files-folder-recurse: true
      #     file-digest: SHA256
      #     timestamp-rfc3161: http://timestamp.acs.microsoft.com
      #     timestamp-digest: SHA256

      - name: Assemble release bundle
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null

          # Portable native binaries
          Copy-Item artifacts/TaskbarHider-x64/TaskbarHider-x64.exe release/
          Copy-Item artifacts/TaskbarHider-x86/TaskbarHider-x86.exe release/

          Copy-Item LICENSE release/LICENSE.txt -Force

          # SHA256SUMS
          $releaseFiles = Get-ChildItem release -File
          $releaseFiles | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$h  $($_.Name)"
          } | Out-File -FilePath release/SHA256SUMS.txt -Encoding ascii

          Get-ChildItem release | Format-Table Name, Length -AutoSize

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/TaskbarHider-Setup-x64.exe
            release/TaskbarHider-Setup-x86.exe
            release/TaskbarHider-x64.exe
            release/TaskbarHider-x86.exe
            release/LICENSE.txt
            release/SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## TaskbarHider ${{ github.ref_name }}

            Lightweight utility that hides the Windows taskbar when no normal app windows are visible.

            ### Recommended download
            - **`TaskbarHider-Setup-x64.exe`** for almost every modern PC
            - **`TaskbarHider-Setup-x86.exe`** for 32-bit Windows
            - Setup wizard asks if TaskbarHider should start when you sign in

            ### Portable download (advanced)
            - **`TaskbarHider-x64.exe`** for almost every modern PC
            - **`TaskbarHider-x86.exe`** only for 32-bit Windows

            ### Notes
            - Emergency exit hotkey: `Ctrl+Alt+Shift+T`
            - Verify downloads with `SHA256SUMS.txt`
            - Unsigned builds may show a SmartScreen reputation warning on first run
